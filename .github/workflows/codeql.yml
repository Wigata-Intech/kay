name: "CodeQL Advanced"

# Advanced setup (replaces GitHub default setup) so we can carry the
# query-filter in .github/codeql/codeql-config.yml. Mirrors GitHub's official
# "CodeQL Advanced" template: same actions + go matrix and query suite, plus
# our config-file. See that config for the one excluded query and its rationale.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly-published CodeQL queries catch existing code.
    - cron: '38 8 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to the Security tab
      packages: read # fetch internal/private CodeQL packs
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: autobuild
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # autobuild needs a toolchain satisfying go.mod's `go 1.26` floor.
      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          check-latest: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

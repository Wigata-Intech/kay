name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true

      - name: gofmt
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then
            echo "These files are not gofmt-clean:"; echo "$fmt"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: test
        run: go test -race ./...

      - name: build
        run: go build ./cmd/kay

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
      - name: gosec
        uses: securego/gosec@master
        with:
          # G115 (integer overflow on conversion) is excluded: it is noisy on
          # /proc parsing and not a real risk here. //nosec directives cover the
          # remaining intentional cases.
          args: -exclude=G115 ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

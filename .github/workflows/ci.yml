name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true

      - name: gofmt
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then
            echo "These files are not gofmt-clean:"; echo "$fmt"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: test
        run: go test -race ./...

      - name: build
        run: go build ./cmd/kay

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  lint:
    runs-on: ubuntu-latest
    # Advisory for now (uses .golangci.yml). Once it passes cleanly on your
    # machine, remove `continue-on-error` to make it a required gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

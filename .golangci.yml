# golangci-lint v2 config. Runs in CI (the `lint` job) and locally via `make lint`.
# gosec runs as its own CI job / `make gosec`, so it is intentionally not enabled
# here (that keeps the //nosec directives authoritative in one place).
version: "2"

linters:
  default: none
  enable:
    - staticcheck # includes the old gosimple + stylecheck checks
    - govet
    - ineffassign
    - unused
    - misspell
    - unconvert

formatters:
  enable:
    - gofmt

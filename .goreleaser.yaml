# GoReleaser — builds cross-platform binaries, archives, and checksums, and
# publishes a GitHub Release when you push a tag (v*).
# Validate config:  goreleaser check
# Dry run locally:  goreleaser release --snapshot --clean
version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: kay
    main: ./cmd/kay
    binary: kay
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath # reproducible: strip local filesystem paths
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}" # reproducible builds
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

# Merge the two macOS builds into one universal binary and ship that instead.
universal_binaries:
  - replace: true

archives:
  - id: kay
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
    name_template: >-
      kay_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

# Release notes come from the tagged version's CHANGELOG.md section, passed via
# `--release-notes` in release.yml — that flag overrides GoReleaser's own
# changelog, so CHANGELOG.md is the single, curated source of truth.
# Do NOT set `changelog.disable: true`: disabling the changelog also suppresses
# `--release-notes`, producing an empty release body. Leaving the changelog at
# its default is fine — it only applies as a fallback when no notes file is given.

release:
  draft: false
  prerelease: auto # v1.2.3-rc1 etc. are marked pre-release automatically

report_sizes: true
